services:
  # MySQL Database as a Private Service
  - type: pserv
    name: mysql-db
    env: docker
    repo: https://github.com/Vijayanand0842/Ecolearn-Backend.git
    dockerfilePath: Dockerfile.mysql # We will provide a small Dockerfile for MySQL
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1
    envVars:
      - key: MYSQL_DATABASE
        value: eco_learning_db
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: MYSQL_USER
        value: ecolearn_user
      - key: MYSQL_PASSWORD
        generateValue: true

  # Spring Boot Web API
  - type: web
    name: ecolearn-api
    env: java
    repo: https://github.com/Vijayanand0842/Ecolearn-Backend.git
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://mysql-db:3306/eco_learning_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - key: SPRING_DATASOURCE_USERNAME
        value: ecolearn_user
      - key: SPRING_DATASOURCE_PASSWORD
        fromService:
          type: pserv
          name: mysql-db
          envVarKey: MYSQL_PASSWORD
